version: "3.9"

services:
  shiny:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: research-station-shiny
    restart: unless-stopped
    volumes:
      - shiny_logs:/var/log/shiny-server
      - shiny_reports:/srv/shiny-server/reports
    expose:
      - "3838"

  nginx:
    image: nginx:1.27-alpine
    container_name: research-station-nginx
    depends_on:
      - shiny
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_certs:/etc/letsencrypt
      - nginx_www:/var/www/certbot
      - nginx_logs:/var/log/nginx

volumes:
  shiny_logs:
  shiny_reports:
  nginx_certs:
  nginx_www:
  nginx_logs:
