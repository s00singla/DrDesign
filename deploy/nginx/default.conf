server {
    listen 80;
    server_name research-station.example.org;

    client_max_body_size 25m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name research-station.example.org;

    client_max_body_size 25m;
    ssl_certificate /etc/letsencrypt/live/research-station.example.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/research-station.example.org/privkey.pem;

    location / {
        proxy_pass http://shiny:3838/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        gzip on;
        gzip_types text/plain text/css application/json application/javascript application/xml;
    }
}
